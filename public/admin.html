<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Undangan Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=R+S&background=C5A880&color=2C3531&size=256&rounded=true&bold=true">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 selection:bg-blue-200">

    <!-- LOGIN PANEL -->
    <div id="login-panel" class="fixed inset-0 bg-gradient-to-br from-slate-900 via-slate-800 to-blue-900 flex items-center justify-center z-50 p-4">
        <div class="bg-white/95 backdrop-blur-md p-10 rounded-[2rem] shadow-2xl w-full max-w-md border border-white/20 transform transition-all">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-3xl font-extrabold text-center text-slate-800 mb-2">Admin Portal</h2>
            <p class="text-center text-slate-500 mb-8 text-sm">Silakan masuk untuk mengelola undangan</p>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" id="username" placeholder="Masukkan username..." required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all duration-200 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition-all duration-200 text-sm">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-blue-500/30 hover:shadow-blue-500/50 hover:-translate-y-0.5 transition-all duration-200 mt-4">
                    Masuk ke Dashboard
                </button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD PANEL -->
    <div id="dashboard-panel" class="hidden">
        <nav class="bg-white/80 backdrop-blur-lg border-b border-slate-200 sticky top-0 z-40 px-6 py-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 text-white rounded-xl flex items-center justify-center font-bold text-lg shadow-sm">UD</div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-800 leading-tight">Undangan Digital</h1>
                        <p class="text-xs text-slate-500 font-medium">Dashboard Management</p>
                    </div>
                </div>
                <button id="logoutBtn" class="flex items-center gap-2 bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-sm font-semibold hover:bg-rose-100 transition-colors border border-rose-100">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-6 grid lg:grid-cols-3 gap-6 md:gap-8 mt-4">
            <!-- KOLOM KIRI -->
            <div class="lg:col-span-1 space-y-6">
                <!-- Form Pengaturan -->
                <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100">
                    <div class="flex items-center gap-3 mb-6 pb-4 border-b border-slate-100">
                        <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Edit Konten</h2>
                    </div>
                    
                    <form id="configForm" class="space-y-6 text-sm">
                        <!-- Perjalanan Cinta -->
                        <div class="space-y-3">
                            <label class="flex items-center gap-2 text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2 bg-indigo-50 px-3 py-1.5 rounded-md inline-block w-fit">Perjalanan Cinta</label>
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Kisah 1 (Awal Bertemu)</p>
                                <input type="text" id="story1-title" placeholder="Judul Kisah" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500">
                                <input type="text" id="story1-date" placeholder="Waktu (Misal: Jan 2024)" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500">
                                <textarea id="story1-desc" placeholder="Tulis cerita singkat di sini..." rows="2" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500"></textarea>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100 space-y-3">
                                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Kisah 2 (Lamaran)</p>
                                <input type="text" id="story2-title" placeholder="Judul Kisah" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500">
                                <input type="text" id="story2-date" placeholder="Waktu (Misal: Feb 2025)" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500">
                                <textarea id="story2-desc" placeholder="Tulis cerita singkat di sini..." rows="2" class="w-full px-3 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-indigo-500"></textarea>
                            </div>
                        </div>

                        <!-- Data Mempelai -->
                        <div class="space-y-4 pt-4 border-t border-slate-100">
                            <label class="flex items-center gap-2 text-xs font-bold text-blue-600 uppercase tracking-widest bg-blue-50 px-3 py-1.5 rounded-md inline-block w-fit">Mempelai Pria</label>
                            <div class="space-y-3">
                                <input type="text" id="pria" placeholder="Nama Panggilan Pria" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                                <input type="text" id="ortuPria" placeholder="Nama Orang Tua Pria" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                                <input type="text" id="urlFotoPria" placeholder="Link Foto Pria (Bulat)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                                <input type="text" id="igPria" placeholder="Link Instagram Pria" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                            </div>

                            <label class="flex items-center gap-2 text-xs font-bold text-pink-600 uppercase tracking-widest bg-pink-50 px-3 py-1.5 rounded-md inline-block w-fit mt-6">Mempelai Wanita</label>
                            <div class="space-y-3">
                                <input type="text" id="wanita" placeholder="Nama Panggilan Wanita" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-pink-500">
                                <input type="text" id="ortuWanita" placeholder="Nama Orang Tua Wanita" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-pink-500">
                                <input type="text" id="urlFotoWanita" placeholder="Link Foto Wanita (Bulat)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-pink-500">
                                <input type="text" id="igWanita" placeholder="Link Instagram Wanita" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-pink-500">
                            </div>
                        </div>

                        <!-- Detail Acara -->
                        <div class="space-y-3 pt-4 border-t border-slate-100">
                            <label class="flex items-center gap-2 text-xs font-bold text-amber-600 uppercase tracking-widest bg-amber-50 px-3 py-1.5 rounded-md inline-block w-fit mb-2">Detail Acara</label>
                            <input type="text" id="tgl" placeholder="Tanggal Acara (Contoh: Minggu, 15 Nov 2026)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-amber-500">
                            <div class="grid grid-cols-2 gap-3">
                                <input type="text" id="akd" placeholder="Jam Akad (08:00 WIB)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-amber-500">
                                <input type="text" id="altAkd" placeholder="Lokasi Akad" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-amber-500">
                            </div>
                            <input type="text" id="altRsp" placeholder="Alamat Lengkap & Tempat Resepsi" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-amber-500">
                        </div>

                        <!-- Keuangan -->
                        <div class="space-y-3 pt-4 border-t border-slate-100">
                            <label class="flex items-center gap-2 text-xs font-bold text-emerald-600 uppercase tracking-widest bg-emerald-50 px-3 py-1.5 rounded-md inline-block w-fit mb-2">Rekening / Amplop Digital</label>
                            <input type="text" id="bnk" placeholder="Nama Bank" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500">
                            <input type="text" id="rek" placeholder="Nomor Rekening" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500">
                            <input type="text" id="an" placeholder="Atas Nama" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-emerald-500">
                        </div>

                        <!-- Foto & Galeri -->
                        <div class="space-y-3 pt-4 border-t border-slate-100">
                            <label class="flex items-center gap-2 text-xs font-bold text-purple-600 uppercase tracking-widest bg-purple-50 px-3 py-1.5 rounded-md inline-block w-fit mb-2">Foto & Galeri (Link ImgBB)</label>
                            <input type="text" id="hero" placeholder="Link Foto Cover Depan / Utama" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-medium text-purple-700 outline-none focus:border-purple-500">
                            <div class="grid grid-cols-2 gap-3 mt-3">
                                <input type="text" id="galeri1" placeholder="Foto Galeri 1" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-purple-500">
                                <input type="text" id="galeri2" placeholder="Foto Galeri 2" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-purple-500">
                                <input type="text" id="galeri3" placeholder="Foto Galeri 3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-purple-500">
                                <input type="text" id="galeri4" placeholder="Foto Galeri 4" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-purple-500">
                                <input type="text" id="galeri5" placeholder="Foto Galeri 5" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-purple-500">
                                <input type="text" id="galeri6" placeholder="Foto Galeri 6" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-purple-500">
                            </div>
                        </div>

                        <!-- Tombol Submit -->
                        <div class="pt-6">
                            <button type="submit" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-blue-700 text-white py-4 rounded-xl font-bold text-base shadow-lg shadow-blue-500/30 hover:-translate-y-0.5 transition-all">
                                Simpan Semua Data ke Database
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Generate Link WA -->
                <div class="bg-gradient-to-br from-emerald-50 to-teal-50 p-6 md:p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-emerald-100">
                    <h2 class="text-xl font-bold text-emerald-900 mb-6">Sebar Undangan (WA)</h2>
                    <div class="space-y-4">
                        <input type="text" id="targetName" placeholder="Nama Tamu (Contoh: Bpk. Joko)" class="w-full px-4 py-3 bg-white border border-emerald-200 rounded-xl outline-none focus:border-emerald-500">
                        <button id="generateBtn" class="w-full bg-emerald-600 text-white py-3.5 rounded-xl font-bold hover:bg-emerald-700 transition-all">
                            Generate Teks & Salin
                        </button>
                    </div>
                </div>

                <!-- GANTI USERNAME & PASSWORD -->
                <div class="bg-gradient-to-br from-rose-50 to-orange-50 p-6 md:p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-rose-100">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="p-2 bg-rose-100 text-rose-600 rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h2 class="text-xl font-bold text-rose-900">Pengaturan Akun</h2>
                    </div>
                    
                    <form id="accountForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-rose-700 uppercase tracking-wider mb-2">Username Baru</label>
                            <input type="text" id="newUsername" placeholder="Masukkan username baru..." required class="w-full px-4 py-3 bg-white border border-rose-200 rounded-xl outline-none focus:border-rose-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-rose-700 uppercase tracking-wider mb-2">Password Baru</label>
                            <input type="text" id="newPassword" placeholder="Masukkan password baru..." required class="w-full px-4 py-3 bg-white border border-rose-200 rounded-xl outline-none focus:border-rose-500">
                        </div>
                        <button type="submit" class="w-full bg-rose-600 text-white py-3.5 rounded-xl font-bold hover:bg-rose-700 transition-all shadow-lg shadow-rose-500/30">
                            Simpan & Login Ulang
                        </button>
                    </form>
                </div>

            </div>

            <!-- KOLOM KANAN: TABEL RSVP -->
            <div class="lg:col-span-2">
                <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 h-fit sticky top-24">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 pb-4 border-b border-slate-100">
                        <h2 class="text-xl font-bold text-slate-800">Daftar Kehadiran (RSVP)</h2>
                        <span class="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1.5 rounded-full">Otomatis Update</span>
                    </div>
                    
                    <div class="overflow-x-auto rounded-xl border border-slate-200">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider">
                                    <th class="p-4 font-bold border-b border-slate-200">Nama Tamu</th>
                                    <th class="p-4 font-bold border-b border-slate-200">Status</th>
                                    <th class="p-4 font-bold border-b border-slate-200 w-2/5">Ucapan & Doa</th>
                                    <th class="p-4 font-bold border-b border-slate-200 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="guestTableBody" class="divide-y divide-slate-100">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-slate-400 text-sm italic">Memuat data tamu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT UTAMA -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loginPanel = document.getElementById('login-panel');
            const dashboardPanel = document.getElementById('dashboard-panel');

            if (sessionStorage.getItem('isAdminLoggedIn') === 'true' && sessionStorage.getItem('adminToken')) { 
                showDashboard(); 
            }

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                try {
                    const res = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    if (!res.ok) return alert(`Error Server: ${res.status}`);
                    
                    const data = await res.json();
                    if (data.success) {
                        sessionStorage.setItem('isAdminLoggedIn', 'true');
                        sessionStorage.setItem('adminToken', data.token);
                        showDashboard();
                    } else { 
                        alert('Username atau Password salah!'); 
                    }
                } catch (err) {
                    alert(`Gagal konek ke backend. Error: ${err.message}`);
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                sessionStorage.removeItem('isAdminLoggedIn');
                sessionStorage.removeItem('adminToken');
                window.location.reload();
            });

            function showDashboard() {
                loginPanel.classList.add('hidden');
                dashboardPanel.classList.remove('hidden');
                loadDataTamu();
                loadConfigAwal();
                loadAccountInfo();
            }

            // Fungsi Ambil Data Tamu
            window.loadDataTamu = async function() {
                const body = document.getElementById('guestTableBody');
                try {
                    const res = await fetch('/api/admin/guests', {
                        headers: { 'Authorization': sessionStorage.getItem('adminToken') }
                    });
                    if (!res.ok) {
                        body.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-rose-500">Gagal memuat data (Status ${res.status}). Silakan Logout dan Login kembali.</td></tr>`;
                        return;
                    }
                    const result = await res.json();
                    if (result.success) {
                        body.innerHTML = '';
                        if(!result.data || result.data.length === 0) {
                            body.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-slate-400">Belum ada tamu yang mengisi RSVP.</td></tr>`;
                            return;
                        }
                        result.data.forEach(g => {
                            let badgeColor = 'bg-blue-100 text-blue-700';
                            if(g.attendance && g.attendance.toLowerCase().includes('tidak')) badgeColor = 'bg-rose-100 text-rose-700';
                            if(g.attendance && (g.attendance.toLowerCase().includes('ragu') || g.attendance.toLowerCase().includes('mungkin'))) badgeColor = 'bg-amber-100 text-amber-700';

                            body.innerHTML += `
                                <tr class="text-sm hover:bg-slate-50 transition-colors">
                                    <td class="p-4 font-semibold text-slate-800">${g.name}</td>
                                    <td class="p-4"><span class="px-3 py-1 rounded-full text-xs font-bold ${badgeColor}">${g.attendance}</span></td>
                                    <td class="p-4 text-slate-600 italic">"${g.message}"</td>
                                    <td class="p-4 text-center">
                                        <button onclick="hapusTamu('${g._id}')" class="text-rose-500 hover:text-white hover:bg-rose-600 p-2 rounded-lg" title="Hapus Data">
                                            Hapus
                                        </button>
                                    </td>
                                </tr>`;
                        });
                    }
                } catch (error) {
                    body.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-rose-500">Error: ${error.message}</td></tr>`;
                }
            }

            // Fungsi Hapus Tamu
            window.hapusTamu = async function(id) {
                if(confirm('Yakin ingin menghapus tamu ini permanen?')) {
                    try {
                        const res = await fetch(`/api/admin/guests/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': sessionStorage.getItem('adminToken') }
                        });
                        const result = await res.json();
                        if(result.success) {
                            loadDataTamu();
                        } else {
                            alert('Gagal menghapus: ' + result.error);
                        }
                    } catch (error) {
                        alert('Terjadi kesalahan saat menghapus data.');
                    }
                }
            }

            // Menampilkan Data Akun ke Form
            async function loadAccountInfo() {
                try {
                    const res = await fetch('/api/admin/credentials', {
                        headers: { 'Authorization': sessionStorage.getItem('adminToken') }
                    });
                    const result = await res.json();
                    if (result.success) {
                        document.getElementById('newUsername').value = result.username;
                    }
                } catch (error) {
                    console.log("Gagal menarik data username", error);
                }
            }

            // Proses Ubah Akun
            document.getElementById('accountForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                if(!confirm('Yakin mau ganti akun? Setelah sukses Abang harus login ulang ya!')) return;

                const newUsername = document.getElementById('newUsername').value.trim();
                const newPassword = document.getElementById('newPassword').value.trim();

                try {
                    const res = await fetch('/api/admin/change-credentials', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': sessionStorage.getItem('adminToken') 
                        },
                        body: JSON.stringify({ newUsername, newPassword })
                    });
                    const result = await res.json();
                    if(result.success) {
                        alert('Akun berhasil diubah! Silakan login kembali dengan Password baru.');
                        document.getElementById('logoutBtn').click(); // Langsung auto logout
                    } else {
                        alert('Gagal mengubah akun.');
                    }
                } catch (error) {
                    alert('Error sistem saat mengubah akun.');
                }
            });

            // Fungsi Tarik Data Form Konten
            async function loadConfigAwal() {
                try {
                    const res = await fetch('/api/wedding-info');
                    if (!res.ok) return;
                    const result = await res.json();
                    
                    if (result.success && result.data) {
                        const d = result.data;
                        document.getElementById('hero').value = d.urlFotoHero || '';
                        document.getElementById('ortuPria').value = d.ortuPria || '';
                        document.getElementById('urlFotoPria').value = d.urlFotoPria || '';
                        document.getElementById('igPria').value = d.igPria || '';
                        document.getElementById('ortuWanita').value = d.ortuWanita || '';
                        document.getElementById('urlFotoWanita').value = d.urlFotoWanita || '';
                        document.getElementById('igWanita').value = d.igWanita || '';
                        document.getElementById('pria').value = d.mempelaiPria || '';
                        document.getElementById('wanita').value = d.mempelaiWanita || '';
                        document.getElementById('tgl').value = d.tanggalAcara || '';
                        document.getElementById('akd').value = d.jamAkad || '';
                        document.getElementById('altAkd').value = d.alamatAkad || '';
                        document.getElementById('altRsp').value = d.alamatResepsi || '';
                        document.getElementById('bnk').value = d.namaBank || '';
                        document.getElementById('rek').value = d.noRekening || '';
                        document.getElementById('an').value = d.atasNamaRekening || '';
                        
                        if (d.urlFotoGaleri) {
                            document.getElementById('galeri1').value = d.urlFotoGaleri[0] || '';
                            document.getElementById('galeri2').value = d.urlFotoGaleri[1] || '';
                            document.getElementById('galeri3').value = d.urlFotoGaleri[2] || '';
                            if(document.getElementById('galeri4')) document.getElementById('galeri4').value = d.urlFotoGaleri[3] || '';
                            if(document.getElementById('galeri5')) document.getElementById('galeri5').value = d.urlFotoGaleri[4] || '';
                            if(document.getElementById('galeri6')) document.getElementById('galeri6').value = d.urlFotoGaleri[5] || '';
                        }
                        if (d.ceritaCinta) {
                            if (d.ceritaCinta[0]) {
                                document.getElementById('story1-title').value = d.ceritaCinta[0].judul || '';
                                document.getElementById('story1-date').value = d.ceritaCinta[0].tanggal || '';
                                document.getElementById('story1-desc').value = d.ceritaCinta[0].deskripsi || '';
                            }
                            if (d.ceritaCinta[1]) {
                                document.getElementById('story2-title').value = d.ceritaCinta[1].judul || '';
                                document.getElementById('story2-date').value = d.ceritaCinta[1].tanggal || '';
                                document.getElementById('story2-desc').value = d.ceritaCinta[1].deskripsi || '';
                            }
                        }
                    }
                } catch (err) {
                    console.error("Gagal load data form:", err);
                }
            }

            // Fungsi Simpan ke Database
            document.getElementById('configForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = e.target.querySelector('button[type="submit"]');
                const textAwal = btn.innerHTML;
                btn.innerHTML = `Menyimpan...`;
                
                const arrayGaleri = [
                    document.getElementById('galeri1').value.trim(), document.getElementById('galeri2').value.trim(), document.getElementById('galeri3').value.trim(),
                    document.getElementById('galeri4') ? document.getElementById('galeri4').value.trim() : '',
                    document.getElementById('galeri5') ? document.getElementById('galeri5').value.trim() : '',
                    document.getElementById('galeri6') ? document.getElementById('galeri6').value.trim() : ''
                ].filter(url => url !== "");

                const arrayCerita = [
                    { judul: document.getElementById('story1-title').value.trim(), tanggal: document.getElementById('story1-date').value.trim(), deskripsi: document.getElementById('story1-desc').value.trim() },
                    { judul: document.getElementById('story2-title').value.trim(), tanggal: document.getElementById('story2-date').value.trim(), deskripsi: document.getElementById('story2-desc').value.trim() }
                ].filter(c => c.judul !== "");

                const payload = {
                    urlFotoHero: document.getElementById('hero').value, ortuPria: document.getElementById('ortuPria').value, urlFotoPria: document.getElementById('urlFotoPria').value, igPria: document.getElementById('igPria').value, ortuWanita: document.getElementById('ortuWanita').value, urlFotoWanita: document.getElementById('urlFotoWanita').value, igWanita: document.getElementById('igWanita').value, mempelaiPria: document.getElementById('pria').value, mempelaiWanita: document.getElementById('wanita').value, tanggalAcara: document.getElementById('tgl').value, jamAkad: document.getElementById('akd').value, alamatAkad: document.getElementById('altAkd').value, alamatResepsi: document.getElementById('altRsp').value, namaBank: document.getElementById('bnk').value, noRekening: document.getElementById('rek').value, atasNamaRekening: document.getElementById('an').value, urlFotoGaleri: arrayGaleri, ceritaCinta: arrayCerita
                };

                try {
                    const res = await fetch('/api/admin/update-info', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': sessionStorage.getItem('adminToken') },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    if(data.success) { 
                        alert('Data berhasil disimpan!'); 
                        window.location.reload(); 
                    } else {
                        btn.innerHTML = textAwal; 
                        alert('Gagal menyimpan, silakan coba lagi.');
                    }
                } catch (err) {
                    btn.innerHTML = textAwal;
                    alert('Error jaringan saat menyimpan data.');
                }
            });

            // Fungsi Sebar WA
            document.getElementById('generateBtn').addEventListener('click', () => {
                const tName = document.getElementById('targetName').value.trim();
                const namaPria = document.getElementById('pria').value.trim() || "Raga";
                const namaWanita = document.getElementById('wanita').value.trim() || "Maya";
                if (!tName) return alert('Ketik nama tamu dulu!');
                
                const slugPasangan = `${namaPria.toLowerCase()}-${namaWanita.toLowerCase()}`.replace(/\s+/g, '');
                const encodedName = encodeURIComponent(tName).replace(/%20/g, '+');
                const inviteUrl = `${window.location.origin}/${slugPasangan}/?to=${encodedName}`;
                
                const textWA = `Kepada Yth. Bapak/Ibu/Saudara/i *${tName}*,\n\nTanpa mengurangi rasa hormat, kami bermaksud mengundang Anda untuk hadir di acara pernikahan kami.\n\nSilakan klik tautan berikut untuk membuka detail undangan:\n${inviteUrl}\n\nMerupakan suatu kehormatan dan kebahagiaan bagi kami apabila Anda berkenan hadir dan memberikan doa restu.\n\nSalam hangat,\n*${namaPria} & ${namaWanita}*`;

                navigator.clipboard.writeText(textWA).then(() => {
                    alert(`✅ Teks undangan untuk ${tName} berhasil disalin!`);
                    document.getElementById('targetName').value = ''; 
                });
            });
        });
    </script>
</body>
</html>
